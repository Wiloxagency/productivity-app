# ===========================================================================
# nginx — Productivity App  (tracker.wiloxagency.com)
#
# Sirve el frontend estático (build de Vite) y hace proxy de /api/ al backend
# que corre en PM2 (proceso "tracker-api") en 127.0.0.1:8730.
#
# Instalar (una sola vez):
#   sudo cp deploy/nginx/tracker.wiloxagency.com.conf \
#           /etc/nginx/sites-available/tracker.wiloxagency.com
#   sudo ln -s /etc/nginx/sites-available/tracker.wiloxagency.com \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Si cambias el puerto en ecosystem.config.cjs, cámbialo también en proxy_pass.
# ===========================================================================

server {
    listen 80;
    listen [::]:80;
    server_name tracker.wiloxagency.com;

    # Frontend estático (Vite build dentro del repo clonado)
    root /projects/productivity-app/frontend/dist;
    index index.html;

    client_max_body_size 20M;

    access_log /var/log/nginx/tracker.wiloxagency.com.access.log;
    error_log  /var/log/nginx/tracker.wiloxagency.com.error.log;

    # API -> backend PM2 (sin barra final en proxy_pass: conserva el prefijo /api/)
    location /api/ {
        proxy_pass http://127.0.0.1:8730;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Assets con hash de Vite: cache larga
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback SPA (React Router): cualquier ruta no-archivo sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
